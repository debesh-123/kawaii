<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maintenance</title>
    <link rel="icon" type="image/png" href="Cry.png" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #ffffff;
      }

      .maintenance-card {
        width: min(700px, 100%);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 40px 28px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }

      .icon {
        font-size: 3rem;
        margin-bottom: 18px;
      }

      h1 {
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        margin-bottom: 14px;
        letter-spacing: 0.5px;
      }

      .main-text {
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        line-height: 1.7;
        color: #e2e8f0;
        margin-bottom: 16px;
      }

      .highlight {
        display: inline-block;
        margin-top: 8px;
        font-weight: bold;
        color: #93c5fd;
      }

      .credit {
        margin-top: 22px;
        font-size: 0.95rem;
        color: #cbd5e1;
        opacity: 0.95;
      }

      .dots {
        display: inline-block;
        width: 1.5em;
        text-align: left;
      }

      @keyframes blink {
        0% {
          content: "";
        }
        33% {
          content: ".";
        }
        66% {
          content: "..";
        }
        100% {
          content: "...";
        }
      }

      @media (max-width: 600px) {
        .maintenance-card {
          padding: 30px 20px;
          border-radius: 18px;
        }

        .icon {
          font-size: 2.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="maintenance-card">
      <div class="icon">🛠️</div>
      <h1>Website is on maintenance</h1>
      <p class="main-text">
        The website is currently under maintenance and may be online in
        <span class="highlight">24–48 hour</span>.
      </p>
      <p class="credit">_@debesh</p>
    </div>
  </body>
</html>
